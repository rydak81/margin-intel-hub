<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Margin Intel Hub - ThreeColts Content Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-gray-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // News categories and platforms
        const PLATFORMS = ['Amazon', 'Walmart', 'eBay', 'Carrier', 'Macro', 'Other'];
        const CATEGORIES = ['Fees', 'Chargebacks', 'Logistics', 'Policy', 'Profitability', 'Compliance', 'Inventory'];
        const PRODUCTS = ['MarginPro', 'Multichannel Pro', 'Seller365', 'All'];
        const POST_STATUS = ['Saved', 'Drafted', 'Posted', 'Scheduled'];

        // Post templates based on the strategy
        const POST_TEMPLATES = {
            'news-action': {
                name: 'News → Action',
                structure: 'Hook: [headline]\nReceipt: [what changed]\nTake: [what agencies miss]\nAction: [3 steps]\nTool tie-in: [product]\nCTA: [call to action]'
            },
            'myth-reality': {
                name: 'Myth vs Reality',
                structure: 'Myth: [common belief]\nReality: [actual truth]\nWhy it matters: [impact]\nWhat to do: [action steps]\nTool tie-in: [product]\nCTA: [call to action]'
            },
            'framework': {
                name: 'Framework/Checklist',
                structure: 'Title: [framework name]\nContext: [why it matters]\nSteps/Layers:\n1. [step 1]\n2. [step 2]\n3. [step 3]\nTool tie-in: [product]\nCTA: [call to action]'
            },
            'pain-story': {
                name: 'Pain Story',
                structure: 'The problem: [pain point]\nWhy it happens: [root cause]\nWhat most agencies do: [wrong approach]\nWhat winning agencies do: [right approach]\nTool tie-in: [product]\nCTA: [call to action]'
            },
            'operator-take': {
                name: 'Operator Take',
                structure: 'Hot take: [contrarian view]\nWhy this matters: [reasoning]\nWhat operators should know: [insight]\nHow to apply: [action]\nTool tie-in: [product]\nCTA: [call to action]'
            }
        };

        function MarginIntelHub() {
            const [articles, setArticles] = useState([]);
            const [selectedArticle, setSelectedArticle] = useState(null);
            const [activeTab, setActiveTab] = useState('dashboard');
            const [filters, setFilters] = useState({
                platform: 'All',
                category: 'All',
                status: 'All'
            });

            // Form state for new article
            const [newArticle, setNewArticle] = useState({
                date: new Date().toISOString().split('T')[0],
                platform: 'Amazon',
                category: 'Fees',
                headline: '',
                sourceLink: '',
                summary: ['', '', ''],
                soWhat: '',
                postAngle: '',
                toolMapping: 'MarginPro',
                status: 'Saved',
                postTemplate: 'news-action'
            });

            // Load from localStorage
            useEffect(() => {
                const saved = localStorage.getItem('marginIntelArticles');
                if (saved) {
                    setArticles(JSON.parse(saved));
                } else {
                    // Add sample articles
                    const samples = [
                        {
                            id: Date.now(),
                            date: '2026-01-15',
                            platform: 'Amazon',
                            category: 'Fees',
                            headline: 'Amazon announces 2026 FBA fee updates - average $0.08/unit increase',
                            sourceLink: 'https://sellercentral.amazon.com',
                            summary: [
                                'Average FBA fulfillment fee increase of ~$0.08 per unit effective January 15, 2026',
                                'Inbound placement service fees updated for split shipments',
                                'Storage fees adjusted for peak season (Oct-Dec)'
                            ],
                            soWhat: 'Pennies become EBITDA problems at scale. For agencies managing 50-100 SKUs per client, this can mean $5-15K in annual margin erosion that nobody notices until retention conversations start. The real issue: most agencies can\'t explain where profit went.',
                            postAngle: 'Amazon fees didn\'t "go up a lot"... but that\'s the problem. Small fee increases compound across inventory. If you run an agency and don\'t have a margin protection layer, you\'re leaving retention on the table.',
                            toolMapping: 'MarginPro',
                            status: 'Saved',
                            postTemplate: 'news-action'
                        }
                    ];
                    setArticles(samples);
                    localStorage.setItem('marginIntelArticles', JSON.stringify(samples));
                }
            }, []);

            // Save to localStorage
            useEffect(() => {
                if (articles.length > 0) {
                    localStorage.setItem('marginIntelArticles', JSON.stringify(articles));
                }
            }, [articles]);

            const addArticle = () => {
                const article = {
                    ...newArticle,
                    id: Date.now()
                };
                setArticles([article, ...articles]);
                // Reset form
                setNewArticle({
                    date: new Date().toISOString().split('T')[0],
                    platform: 'Amazon',
                    category: 'Fees',
                    headline: '',
                    sourceLink: '',
                    summary: ['', '', ''],
                    soWhat: '',
                    postAngle: '',
                    toolMapping: 'MarginPro',
                    status: 'Saved',
                    postTemplate: 'news-action'
                });
                setActiveTab('dashboard');
            };

            const updateArticleStatus = (id, status) => {
                setArticles(articles.map(a => a.id === id ? {...a, status} : a));
            };

            const deleteArticle = (id) => {
                if (confirm('Delete this article?')) {
                    setArticles(articles.filter(a => a.id !== id));
                }
            };

            const generateLinkedInPost = async (article) => {
                const template = POST_TEMPLATES[article.postTemplate];
                
                // Generate post using AI
                try {
                    const response = await fetch('https://api.anthropic.com/v1/messages', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({
                            model: 'claude-sonnet-4-20250514',
                            max_tokens: 1000,
                            messages: [{
                                role: 'user',
                                content: `Generate a LinkedIn post for ThreeColts agency partnerships.

Article Context:
- Headline: ${article.headline}
- Summary: ${article.summary.join('. ')}
- So What: ${article.soWhat}
- Tool Mapping: ${article.toolMapping}

Template Structure:
${template.structure}

Post Angle: ${article.postAngle}

Requirements:
- Write in Ryan's voice: direct, operator-focused, no fluff
- Focus on agency profitability, retention, and channel expansion
- Tie to ${article.toolMapping} naturally (not salesy)
- Include a clear CTA (comment 'X' or DM 'Y')
- Keep it under 1300 characters
- Use short paragraphs, line breaks for readability

Generate the LinkedIn post now:`
                            }]
                        })
                    });

                    const data = await response.json();
                    const generatedPost = data.content.find(item => item.type === 'text')?.text || 'Error generating post';
                    
                    setSelectedArticle({...article, generatedPost});
                    setActiveTab('post-generator');
                } catch (error) {
                    alert('Error generating post: ' + error.message);
                }
            };

            const filteredArticles = articles.filter(a => {
                if (filters.platform !== 'All' && a.platform !== filters.platform) return false;
                if (filters.category !== 'All' && a.category !== filters.category) return false;
                if (filters.status !== 'All' && a.status !== filters.status) return false;
                return true;
            });

            const stats = {
                total: articles.length,
                saved: articles.filter(a => a.status === 'Saved').length,
                drafted: articles.filter(a => a.status === 'Drafted').length,
                posted: articles.filter(a => a.status === 'Posted').length
            };

            return (
                <div className="min-h-screen bg-gray-50">
                    {/* Header */}
                    <div className="bg-blue-600 text-white shadow-lg">
                        <div className="max-w-7xl mx-auto px-4 py-6">
                            <h1 className="text-3xl font-bold">Margin Intel Hub</h1>
                            <p className="text-blue-100 mt-1">ThreeColts Partnership Content Engine</p>
                        </div>
                    </div>

                    {/* Stats Bar */}
                    <div className="bg-white border-b shadow-sm">
                        <div className="max-w-7xl mx-auto px-4 py-4">
                            <div className="grid grid-cols-4 gap-4">
                                <div className="text-center">
                                    <div className="text-2xl font-bold text-gray-900">{stats.total}</div>
                                    <div className="text-sm text-gray-600">Total Articles</div>
                                </div>
                                <div className="text-center">
                                    <div className="text-2xl font-bold text-yellow-600">{stats.saved}</div>
                                    <div className="text-sm text-gray-600">Saved</div>
                                </div>
                                <div className="text-center">
                                    <div className="text-2xl font-bold text-blue-600">{stats.drafted}</div>
                                    <div className="text-sm text-gray-600">Drafted</div>
                                </div>
                                <div className="text-center">
                                    <div className="text-2xl font-bold text-green-600">{stats.posted}</div>
                                    <div className="text-sm text-gray-600">Posted</div>
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* Navigation Tabs */}
                    <div className="bg-white border-b">
                        <div className="max-w-7xl mx-auto px-4">
                            <div className="flex space-x-8">
                                {['dashboard', 'add-article', 'post-generator', 'calendar'].map(tab => (
                                    <button
                                        key={tab}
                                        onClick={() => setActiveTab(tab)}
                                        className={`py-4 px-2 border-b-2 font-medium text-sm ${
                                            activeTab === tab
                                                ? 'border-blue-500 text-blue-600'
                                                : 'border-transparent text-gray-500 hover:text-gray-700 hover:border-gray-300'
                                        }`}
                                    >
                                        {tab.split('-').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ')}
                                    </button>
                                ))}
                            </div>
                        </div>
                    </div>

                    {/* Main Content */}
                    <div className="max-w-7xl mx-auto px-4 py-8">
                        {/* Dashboard Tab */}
                        {activeTab === 'dashboard' && (
                            <div>
                                {/* Filters */}
                                <div className="bg-white rounded-lg shadow p-4 mb-6">
                                    <div className="grid grid-cols-3 gap-4">
                                        <div>
                                            <label className="block text-sm font-medium text-gray-700 mb-2">Platform</label>
                                            <select
                                                value={filters.platform}
                                                onChange={(e) => setFilters({...filters, platform: e.target.value})}
                                                className="w-full px-3 py-2 border rounded-lg"
                                            >
                                                <option>All</option>
                                                {PLATFORMS.map(p => <option key={p}>{p}</option>)}
                                            </select>
                                        </div>
                                        <div>
                                            <label className="block text-sm font-medium text-gray-700 mb-2">Category</label>
                                            <select
                                                value={filters.category}
                                                onChange={(e) => setFilters({...filters, category: e.target.value})}
                                                className="w-full px-3 py-2 border rounded-lg"
                                            >
                                                <option>All</option>
                                                {CATEGORIES.map(c => <option key={c}>{c}</option>)}
                                            </select>
                                        </div>
                                        <div>
                                            <label className="block text-sm font-medium text-gray-700 mb-2">Status</label>
                                            <select
                                                value={filters.status}
                                                onChange={(e) => setFilters({...filters, status: e.target.value})}
                                                className="w-full px-3 py-2 border rounded-lg"
                                            >
                                                <option>All</option>
                                                {POST_STATUS.map(s => <option key={s}>{s}</option>)}
                                            </select>
                                        </div>
                                    </div>
                                </div>

                                {/* Articles List */}
                                <div className="space-y-4">
                                    {filteredArticles.map(article => (
                                        <div key={article.id} className="bg-white rounded-lg shadow hover:shadow-md transition-shadow">
                                            <div className="p-6">
                                                <div className="flex items-start justify-between">
                                                    <div className="flex-1">
                                                        <div className="flex items-center gap-2 mb-2">
                                                            <span className="px-2 py-1 text-xs font-medium bg-blue-100 text-blue-800 rounded">
                                                                {article.platform}
                                                            </span>
                                                            <span className="px-2 py-1 text-xs font-medium bg-purple-100 text-purple-800 rounded">
                                                                {article.category}
                                                            </span>
                                                            <span className="px-2 py-1 text-xs font-medium bg-green-100 text-green-800 rounded">
                                                                {article.toolMapping}
                                                            </span>
                                                            <span className="text-xs text-gray-500">{article.date}</span>
                                                        </div>
                                                        <h3 className="text-lg font-semibold text-gray-900 mb-2">
                                                            {article.headline}
                                                        </h3>
                                                        <div className="text-sm text-gray-600 mb-3">
                                                            {article.summary.filter(s => s).map((s, i) => (
                                                                <div key={i} className="mb-1">• {s}</div>
                                                            ))}
                                                        </div>
                                                        <div className="text-sm text-gray-700 italic mb-3">
                                                            <strong>So What:</strong> {article.soWhat.substring(0, 150)}...
                                                        </div>
                                                        <div className="text-sm text-blue-700">
                                                            <strong>Post Angle:</strong> {article.postAngle.substring(0, 150)}...
                                                        </div>
                                                    </div>
                                                    <div className="ml-4">
                                                        <select
                                                            value={article.status}
                                                            onChange={(e) => updateArticleStatus(article.id, e.target.value)}
                                                            className="px-3 py-1 border rounded text-sm mb-2"
                                                        >
                                                            {POST_STATUS.map(s => <option key={s}>{s}</option>)}
                                                        </select>
                                                    </div>
                                                </div>
                                                <div className="flex gap-2 mt-4 pt-4 border-t">
                                                    <button
                                                        onClick={() => generateLinkedInPost(article)}
                                                        className="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 text-sm font-medium"
                                                    >
                                                        Generate Post
                                                    </button>
                                                    <a
                                                        href={article.sourceLink}
                                                        target="_blank"
                                                        rel="noopener noreferrer"
                                                        className="px-4 py-2 bg-gray-100 text-gray-700 rounded-lg hover:bg-gray-200 text-sm font-medium"
                                                    >
                                                        View Source
                                                    </a>
                                                    <button
                                                        onClick={() => deleteArticle(article.id)}
                                                        className="px-4 py-2 bg-red-100 text-red-700 rounded-lg hover:bg-red-200 text-sm font-medium"
                                                    >
                                                        Delete
                                                    </button>
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                    {filteredArticles.length === 0 && (
                                        <div className="text-center py-12 text-gray-500">
                                            No articles found. Add your first article to get started.
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}

                        {/* Add Article Tab */}
                        {activeTab === 'add-article' && (
                            <div className="bg-white rounded-lg shadow p-6">
                                <h2 className="text-2xl font-bold text-gray-900 mb-6">Add New Article</h2>
                                
                                <div className="space-y-4">
                                    <div className="grid grid-cols-2 gap-4">
                                        <div>
                                            <label className="block text-sm font-medium text-gray-700 mb-2">Date</label>
                                            <input
                                                type="date"
                                                value={newArticle.date}
                                                onChange={(e) => setNewArticle({...newArticle, date: e.target.value})}
                                                className="w-full px-3 py-2 border rounded-lg"
                                            />
                                        </div>
                                        <div>
                                            <label className="block text-sm font-medium text-gray-700 mb-2">Platform</label>
                                            <select
                                                value={newArticle.platform}
                                                onChange={(e) => setNewArticle({...newArticle, platform: e.target.value})}
                                                className="w-full px-3 py-2 border rounded-lg"
                                            >
                                                {PLATFORMS.map(p => <option key={p}>{p}</option>)}
                                            </select>
                                        </div>
                                    </div>

                                    <div className="grid grid-cols-2 gap-4">
                                        <div>
                                            <label className="block text-sm font-medium text-gray-700 mb-2">Category</label>
                                            <select
                                                value={newArticle.category}
                                                onChange={(e) => setNewArticle({...newArticle, category: e.target.value})}
                                                className="w-full px-3 py-2 border rounded-lg"
                                            >
                                                {CATEGORIES.map(c => <option key={c}>{c}</option>)}
                                            </select>
                                        </div>
                                        <div>
                                            <label className="block text-sm font-medium text-gray-700 mb-2">Tool Mapping</label>
                                            <select
                                                value={newArticle.toolMapping}
                                                onChange={(e) => setNewArticle({...newArticle, toolMapping: e.target.value})}
                                                className="w-full px-3 py-2 border rounded-lg"
                                            >
                                                {PRODUCTS.map(p => <option key={p}>{p}</option>)}
                                            </select>
                                        </div>
                                    </div>

                                    <div>
                                        <label className="block text-sm font-medium text-gray-700 mb-2">Headline</label>
                                        <input
                                            type="text"
                                            value={newArticle.headline}
                                            onChange={(e) => setNewArticle({...newArticle, headline: e.target.value})}
                                            className="w-full px-3 py-2 border rounded-lg"
                                            placeholder="Amazon announces 2026 FBA fee updates..."
                                        />
                                    </div>

                                    <div>
                                        <label className="block text-sm font-medium text-gray-700 mb-2">Source Link</label>
                                        <input
                                            type="url"
                                            value={newArticle.sourceLink}
                                            onChange={(e) => setNewArticle({...newArticle, sourceLink: e.target.value})}
                                            className="w-full px-3 py-2 border rounded-lg"
                                            placeholder="https://..."
                                        />
                                    </div>

                                    <div>
                                        <label className="block text-sm font-medium text-gray-700 mb-2">3-Bullet Summary</label>
                                        {[0, 1, 2].map(i => (
                                            <input
                                                key={i}
                                                type="text"
                                                value={newArticle.summary[i]}
                                                onChange={(e) => {
                                                    const newSummary = [...newArticle.summary];
                                                    newSummary[i] = e.target.value;
                                                    setNewArticle({...newArticle, summary: newSummary});
                                                }}
                                                className="w-full px-3 py-2 border rounded-lg mb-2"
                                                placeholder={`Summary point ${i + 1}`}
                                            />
                                        ))}
                                    </div>

                                    <div>
                                        <label className="block text-sm font-medium text-gray-700 mb-2">
                                            "So What?" (Why it matters - your voice)
                                        </label>
                                        <textarea
                                            value={newArticle.soWhat}
                                            onChange={(e) => setNewArticle({...newArticle, soWhat: e.target.value})}
                                            className="w-full px-3 py-2 border rounded-lg"
                                            rows="3"
                                            placeholder="Explain the impact in your operator voice..."
                                        />
                                    </div>

                                    <div>
                                        <label className="block text-sm font-medium text-gray-700 mb-2">
                                            Post Angle (Hook + CTA suggestion)
                                        </label>
                                        <textarea
                                            value={newArticle.postAngle}
                                            onChange={(e) => setNewArticle({...newArticle, postAngle: e.target.value})}
                                            className="w-full px-3 py-2 border rounded-lg"
                                            rows="3"
                                            placeholder="Your initial post angle/hook..."
                                        />
                                    </div>

                                    <div>
                                        <label className="block text-sm font-medium text-gray-700 mb-2">Post Template</label>
                                        <select
                                            value={newArticle.postTemplate}
                                            onChange={(e) => setNewArticle({...newArticle, postTemplate: e.target.value})}
                                            className="w-full px-3 py-2 border rounded-lg"
                                        >
                                            {Object.entries(POST_TEMPLATES).map(([key, template]) => (
                                                <option key={key} value={key}>{template.name}</option>
                                            ))}
                                        </select>
                                        <div className="mt-2 p-3 bg-gray-50 rounded text-sm text-gray-600 whitespace-pre-wrap">
                                            {POST_TEMPLATES[newArticle.postTemplate].structure}
                                        </div>
                                    </div>

                                    <div className="flex gap-4 pt-4">
                                        <button
                                            onClick={addArticle}
                                            disabled={!newArticle.headline || !newArticle.soWhat}
                                            className="px-6 py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700 font-medium disabled:bg-gray-300 disabled:cursor-not-allowed"
                                        >
                                            Save Article
                                        </button>
                                        <button
                                            onClick={() => setActiveTab('dashboard')}
                                            className="px-6 py-3 bg-gray-200 text-gray-700 rounded-lg hover:bg-gray-300 font-medium"
                                        >
                                            Cancel
                                        </button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* Post Generator Tab */}
                        {activeTab === 'post-generator' && (
                            <div>
                                {selectedArticle ? (
                                    <div className="bg-white rounded-lg shadow p-6">
                                        <h2 className="text-2xl font-bold text-gray-900 mb-4">Generated LinkedIn Post</h2>
                                        
                                        <div className="mb-6 p-4 bg-blue-50 rounded-lg">
                                            <div className="text-sm font-medium text-blue-900 mb-2">Article Context:</div>
                                            <div className="text-sm text-blue-800">{selectedArticle.headline}</div>
                                            <div className="text-xs text-blue-600 mt-2">
                                                {selectedArticle.platform} • {selectedArticle.category} • {selectedArticle.toolMapping}
                                            </div>
                                        </div>

                                        <div className="border-2 border-gray-200 rounded-lg p-6 bg-white mb-4">
                                            <div className="whitespace-pre-wrap text-gray-900 leading-relaxed">
                                                {selectedArticle.generatedPost || 'Generating post...'}
                                            </div>
                                        </div>

                                        <div className="flex gap-4">
                                            <button
                                                onClick={() => {
                                                    navigator.clipboard.writeText(selectedArticle.generatedPost);
                                                    alert('Post copied to clipboard!');
                                                }}
                                                className="px-6 py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700 font-medium"
                                            >
                                                Copy to Clipboard
                                            </button>
                                            <button
                                                onClick={() => updateArticleStatus(selectedArticle.id, 'Drafted')}
                                                className="px-6 py-3 bg-green-600 text-white rounded-lg hover:bg-green-700 font-medium"
                                            >
                                                Mark as Drafted
                                            </button>
                                            <button
                                                onClick={() => setSelectedArticle(null)}
                                                className="px-6 py-3 bg-gray-200 text-gray-700 rounded-lg hover:bg-gray-300 font-medium"
                                            >
                                                Back to Articles
                                            </button>
                                        </div>
                                    </div>
                                ) : (
                                    <div className="bg-white rounded-lg shadow p-12 text-center">
                                        <div className="text-gray-400 text-lg mb-4">No article selected</div>
                                        <button
                                            onClick={() => setActiveTab('dashboard')}
                                            className="px-6 py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700 font-medium"
                                        >
                                            Go to Dashboard
                                        </button>
                                    </div>
                                )}
                            </div>
                        )}

                        {/* Calendar Tab */}
                        {activeTab === 'calendar' && (
                            <div className="bg-white rounded-lg shadow p-6">
                                <h2 className="text-2xl font-bold text-gray-900 mb-6">30-Day Content Calendar</h2>
                                
                                <div className="mb-6 p-4 bg-blue-50 rounded-lg">
                                    <h3 className="font-semibold text-blue-900 mb-2">Content Strategy Overview</h3>
                                    <div className="text-sm text-blue-800 space-y-2">
                                        <div><strong>Week 1:</strong> MarginPro - Profit Defense > Growth Theater</div>
                                        <div><strong>Week 2:</strong> MarginPro - News as Authority Weapon</div>
                                        <div><strong>Week 3:</strong> Multichannel Pro - Channel Expansion Without Chaos</div>
                                        <div><strong>Week 4:</strong> Multichannel Pro → Seller365 - Systems Win</div>
                                        <div><strong>Week 5:</strong> Seller365 - Execution & Retention + Conversion</div>
                                    </div>
                                </div>

                                <div className="space-y-6">
                                    {/* Week 1 */}
                                    <div className="border rounded-lg p-4">
                                        <h3 className="font-bold text-lg mb-4 text-gray-900">Week 1: MarginPro Foundation</h3>
                                        <div className="space-y-3">
                                            <div className="flex items-start gap-3 p-3 bg-gray-50 rounded">
                                                <div className="font-semibold text-blue-600 min-w-[60px]">Mon</div>
                                                <div className="flex-1">
                                                    <div className="font-medium">News + Positioning</div>
                                                    <div className="text-sm text-gray-600">Amazon fees update - why pennies become EBITDA</div>
                                                </div>
                                            </div>
